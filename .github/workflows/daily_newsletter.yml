name: Playtime — Daily Send

on:
  schedule:
    - cron: '30 11 * * *'   # 7:30 AM ET (11:30 UTC)
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date (YYYY-MM-DD)'
        required: false
      draft:
        description: 'Post as draft only'
        required: false
        default: 'false'
      preview:
        description: 'Preview only (no post)'
        required: false
        default: 'false'

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests python-dotenv pytz

      - name: Run Playtime generator
        env:
          ANTHROPIC_API_KEY:               ${{ secrets.ANTHROPIC_API_KEY }}
          PLAYTIME_BEEHIIV_API_KEY:        ${{ secrets.BEEHIIV_API_KEY }}
          PLAYTIME_BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.date }}" != "" ]; then ARGS="$ARGS --date ${{ github.event.inputs.date }}"; fi
          if [ "${{ github.event.inputs.draft }}" == "true" ]; then ARGS="$ARGS --draft"; fi
          if [ "${{ github.event.inputs.preview }}" == "true" ]; then ARGS="$ARGS --preview"; fi
          python main.py $ARGS

      - name: Notify on failure
        if: failure()
        run: echo "Playtime send failed — check logs"
